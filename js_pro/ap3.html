<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        
        try {
            let pret = prompt("Introduceti pretul");
            if (isNaN(pret)){
                throw new Error("Pretul trebuie sa fie un numar");
            }
            else {
                alert("Pretul este " + pret);
            }
        }
        catch (error) {
            console.error("A aparut o eroare: " +  error.message);
        }
        finally {
            console.log("Acest cod se va executa intotdeauna");
        }

         for (let i = 0; i < 10; i++){
            console.log(i);
        }

    </script> 

</body>
</html>
