<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckOut</title>
</head>
<body>
    <h1>Checkout</h1>

    <form>
        <fieldset>
            <legend>Address</legend>
            
            <p><strong>Shipping information</strong></p>
            
            <div>
                <input type="text" placeholder="First Name">
                <input type="text" placeholder="Last Name">
            </div>
            <br>

            <div>
                <input type="text" placeholder="Address">
            </div>
            <br>

            <div>
                <input type="text" placeholder="Apartment, suite, etc (optional)">
            </div>
            <br>

            <div>
                <select name="country">
                    <option value="">Country</option>
                    <option value="ro">Romania</option>
                </select>

                <select name="city">
                    <option value="">City</option>
                </select>

                <input type="text" placeholder="Zipcode">
            </div>
            <br>

            <div>
                <input type="text" placeholder="Optional">
            </div>
            <br>

            <div>
                <input type="checkbox" id="save_contact">
                <label for="save_contact">Save contact information</label>
            </div>
        </fieldset>

        <fieldset>
            <legend>Payment</legend>

            <div>
                <div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal" width="60">
                    <button type="button">Cash</button>
                </div>
                <hr>

                <div>
                    <input type="text" placeholder="Cardholder Name">
                    <br><br>
                    <input type="text" placeholder="Card Number">
                    <br><br>
                    
                    <select name="month">
                        <option value="">Month</option>
                    </select>

                    <select name="year">
                        <option value="">Year</option>
                    </select>

                    <input type="text" placeholder="CVC">
                </div>
                <br>

                <div>
                    <input type="checkbox" id="save_card">
                    <label for="save_card">Save card data for future payments</label>
                </div>
            </div>

            <br>
            <button type="submit">Pay with card</button>
        </fieldset>
    </form>
</body>
</html>
